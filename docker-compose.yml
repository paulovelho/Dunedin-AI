services:
  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./api:/app
      - api_node_modules:/app/node_modules
    env_file:
      - ./api/.env
    environment:
      NODE_ENV: development

  app:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - app_node_modules:/app/node_modules
    env_file:
      - ./app/.env

volumes:
  api_node_modules:
  app_node_modules:
