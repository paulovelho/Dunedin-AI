services:
  api:
    container_name: dunedin_api
    build: ./api
    ports:
      - "3000:80"
    volumes:
      - ./api:/var/www/html
    env_file:
      - ./api/.env
    depends_on:
      - db

  app:
    container_name: dunedin_app
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - app_node_modules:/app/node_modules
    env_file:
      - ./app/.env

  db:
    container_name: dunedin_db
    image: mariadb:lts
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: dunedin
      MARIADB_USER: dunedin
      MARIADB_PASSWORD: dunedin
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./api/db/migrations:/docker-entrypoint-initdb.d:ro

volumes:
  app_node_modules:
  db_data:
